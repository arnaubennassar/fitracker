services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3001}
    ports:
      - "3001:3001"
    volumes:
      - app_data:/data

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Fitracker}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  app_data:

